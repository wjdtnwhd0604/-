<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>베트남 학교 입학 서류 아포스티유 공증 대행 서비스</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    /* 기본 테마 및 디자인 토큰 */
    :root {
      --color-primary: #1D9E75;
      --color-primary-dark: #0B3D2E;
      --color-primary-light: #E1F5EE;
      --color-accent: #5DCAA5;
      --color-text-main: #2D3748;
      --color-text-muted: #718096;
      --color-bg-light: #F7FAFC;
      --color-border: #E2E8F0;
      --border-radius-lg: 12px;
      --border-radius-md: 8px;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body { 
      font-family: 'Noto Sans KR', sans-serif; 
      background-color: var(--color-bg-light);
      color: var(--color-text-main);
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    .site-wrap { 
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff; 
      min-height: 100vh; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      position: relative;
    }

    /* Hero 섹션 */
    .hero {
      background: var(--color-primary-dark);
      color: #ffffff;
      padding: 3rem 1.5rem 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(93, 202, 165, 0.1);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -40px; left: 40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(93, 202, 165, 0.05);
    }
    .hero-badge {
      display: inline-block;
      background: rgba(93, 202, 165, 0.2);
      color: var(--color-accent);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    .hero h1 {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 0.75rem;
      color: #ffffff;
    }
    .hero p {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.75);
      max-width: 520px;
    }
    .hero-stats {
      display: flex;
      gap: 1.25rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .hero-stat {
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 14px;
      border-radius: var(--border-radius-md);
      flex: 1;
      min-width: 130px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .hero-stat .num {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-accent);
    }
    .hero-stat .label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    /* 네비게이션 탭 */
    .tab-nav {
      display: flex;
      border-bottom: 1px solid var(--color-border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 14px 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--color-primary-dark);
      font-weight: 700;
      border-bottom-color: var(--color-primary);
    }

    /* 본문 섹션 */
    .section { 
      display: none; 
      padding: 1.5rem; 
    }
    .section.active { 
      display: block; 
    }

    .section-header {
      margin-bottom: 1.25rem;
    }
    .section-header h2 { 
      font-size: 18px; 
      font-weight: 700; 
      color: var(--color-primary-dark); 
      margin-bottom: 0.4rem; 
    }
    .section-header p { 
      font-size: 13px; 
      color: var(--color-text-muted); 
      line-height: 1.5; 
    }

    /* 비교 안내 배너 */
    .savings-banner {
      background: linear-gradient(135deg, #FFF9E6 0%, #FFF3CD 100%);
      border: 1px solid #FFEBAA;
      border-radius: var(--border-radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .savings-banner i {
      font-size: 24px;
      color: #D39E00;
      margin-top: 2px;
    }
    .savings-banner-text h4 {
      font-size: 14px;
      font-weight: 700;
      color: #856404;
      margin-bottom: 4px;
    }
    .savings-banner-text p {
      font-size: 12px;
      color: #664D03;
      line-height: 1.5;
    }

    /* 국가 선택 그리드 */
    .country-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .country-card {
      background: #ffffff;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius-lg);
      padding: 16px 12px;
      cursor: pointer;
      transition: all 0.15s ease-in-out;
      text-align: center;
      position: relative;
